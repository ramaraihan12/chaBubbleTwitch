<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Chat Bubble Overlay</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: 'Inter', 'Roobert', 'Segoe UI', Arial, Helvetica, sans-serif;
}

#controls {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  gap: 10px;
  z-index: 1000;
  transition: all 0.4s ease;
}

#controls.connected {
  top: 10px;
  left: 10px;
  transform: translate(0, 0);
  gap: 6px;
  align-items: center;
}

#controls.connected #channel-input {
  display: none;
}

#channel-input {
  padding: 10px 16px;
  font-size: 16px;
  border: 2px solid rgba(145, 71, 255, 0.7);
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.7);
  color: #fff;
  outline: none;
  width: 260px;
  transition: all 0.3s ease;
}

#channel-input::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

#channel-input:focus {
  border-color: #9147ff;
  box-shadow: 0 0 12px rgba(145, 71, 255, 0.4);
}

#connect-btn {
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #9147ff;
  color: #fff;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s ease;
  white-space: nowrap;
}

#connect-btn:hover {
  background: #772ce8;
  transform: scale(1.05);
}

#connect-btn:active {
  transform: scale(0.97);
}

#connect-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

#connect-btn:disabled:hover {
  background: #9147ff;
  transform: none;
}

#loading-spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-left: 4px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#status-text {
  display: none;
  color: rgba(255, 255, 255, 0.8);
  font-size: 12px;
  margin-left: 4px;
}

#controls.connected #status-text {
  display: inline;
}

#chat-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  z-index: 100;
  max-width: 400px;
  pointer-events: none;
  user-select: none;
}

#chat-container * {
  user-select: none;
}

.chat-bubble {
  position: relative;
  width: 380px;
  height: 130px;
  background-image: url('assetBubble/asset_SGM_new.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
  animation: slideInRight 0.35s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  pointer-events: auto;
  overflow: visible;
  margin-top: -20px; /* Menarik gelembung chat ke atas agar lebih rapat */
  margin-bottom: -20px; /* Menarik gelembung chat ke atas agar lebih rapat */
}

.chat-bubble.removing {
  animation: fadeOutRight 0.3s ease forwards;
}

.bubble-username {
  position: absolute;
  top: 22px; /* Diturunkan dari 16px agar tepat berada di tengah kertas cokelat muda */
  left: 45px;
  width: 110px;
  height: 22px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #2c1810 !important;
  text-shadow: none;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.bubble-message {
  position: absolute;
  top: 48px; /* Diturunkan dari 38px agar tidak menabrak kertas cokelat muda */
  left: 30px;
  right: 30px;
  bottom: 12px;
  font-size: 14px;
  font-weight: 500;
  line-height: 1.4;
  word-wrap: break-word;
  overflow-wrap: break-word;
  color: #ffffff;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
  display: flex;
  align-items: flex-start;
  overflow-y: auto;
  padding-right: 5px;
}

.bubble-message .emote {
  display: inline-block;
  vertical-align: middle;
  height: 1.4em;
  margin: -0.2em 0;
}

@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(120px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes fadeOutRight {
  from {
    opacity: 1;
    transform: translateX(0);
  }
  to {
    opacity: 0;
    transform: translateX(60px);
  }
}
</style>
</head>
<body>

<div id="controls">
  <input id="channel-input" type="text" placeholder="Nama channel Twitch..." autofocus>
  <button id="connect-btn">Connect</button>
  <div id="loading-spinner"></div>
  <span id="status-text"></span>
</div>

<div id="chat-container"></div>

<script src="https://cdn.jsdelivr.net/npm/tmi.js@latest/dist/tmi.min.js">
</script>
<script>
(function () {
  var channelInput = document.getElementById('channel-input');
  var connectBtn = document.getElementById('connect-btn');
  var statusText = document.getElementById('status-text');
  var loadingSpinner = document.getElementById('loading-spinner');
  var controls = document.getElementById('controls');
  var chatContainer = document.getElementById('chat-container');
  var client = null;
  var connected = false;
  var MAX_BUBBLES = 6;

  function parseEmotes(message, emotes) {
    if (!emotes || !Object.keys(emotes).length) {
      return escapeHTML(message);
    }
    var ranges = [];
    var emoteKeys = Object.keys(emotes);
    for (var i = 0; i < emoteKeys.length; i++) {
      var id = emoteKeys[i];
      var positions = emotes[id];
      for (var j = 0; j < positions.length; j++) {
        var parts = positions[j].split('-');
        ranges.push({
          start: parseInt(parts[0], 10),
          end: parseInt(parts[1], 10),
          id: id
        });
      }
    }
    ranges.sort(function (a, b) { return a.start - b.start; });
    var result = '';
    var cursor = 0;
    for (var k = 0; k < ranges.length; k++) {
      var r = ranges[k];
      if (r.start > cursor) {
        result += escapeHTML(message.slice(cursor, r.start));
      }
      var emoteText = message.slice(r.start, r.end + 1);
      var url = 'https://static-cdn.jtvnw.net/emoticons/v2/' + r.id + '/default/dark/1.0';
      result += '<img class="emote" src="' + url + '" alt="' + escapeHTML(emoteText) + '" title="' + escapeHTML(emoteText) + '">';
      cursor = r.end + 1;
    }
    if (cursor < message.length) {
      result += escapeHTML(message.slice(cursor));
    }
    return result;
  }

  function escapeHTML(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function createBubble(username, message, color) {
    var bubble = document.createElement('div');
    bubble.className = 'chat-bubble';

    var nameEl = document.createElement('div');
    nameEl.className = 'bubble-username';
    nameEl.textContent = username;
    nameEl.style.color = color || '#ffffff';

    var msgEl = document.createElement('div');
    msgEl.className = 'bubble-message';

    bubble.appendChild(nameEl);
    bubble.appendChild(msgEl);

    return { bubble: bubble, messageEl: msgEl };
  }

  function addBubble(username, messageHTML, color) {
    var created = createBubble(username, messageHTML, color);
    created.messageEl.innerHTML = messageHTML;
    chatContainer.appendChild(created.bubble);

    var bubbles = chatContainer.querySelectorAll('.chat-bubble');
    while (bubbles.length > MAX_BUBBLES) {
      removeBubble(bubbles[0]);
      bubbles = chatContainer.querySelectorAll('.chat-bubble');
    }
  }

  function removeBubble(bubble) {
    bubble.classList.add('removing');
    bubble.addEventListener('animationend', function () {
      if (bubble.parentNode) {
        bubble.parentNode.removeChild(bubble);
      }
    }, { once: true });
  }

  function onMessage(channel, tags, message, self) {
    if (self) return;

    var username = tags['display-name'] || tags.username || 'Anonymous';
    var color = tags.color || '#ffffff';
    var emotes = tags.emotes || {};
    var parsedMessage = parseEmotes(message, emotes);

    addBubble(username, parsedMessage, color);
  }

  function connect(channelName) {
    if (client) {
      client.disconnect().catch(function () {});
    }

    var cleanChannel = channelName.replace(/^#/, '').trim().toLowerCase();
    if (!cleanChannel) {
      statusText.textContent = 'Masukkan nama channel';
      return;
    }

    connectBtn.disabled = true;
    loadingSpinner.style.display = 'inline-block';
    statusText.style.display = 'inline';
    statusText.textContent = 'Connecting';

    try {
      client = new tmi.Client({
        channels: [cleanChannel]
      });

      client.on('message', onMessage);

      client.on('connected', function () {
        connectBtn.disabled = false;
        loadingSpinner.style.display = 'none';
        statusText.textContent = 'Connected: ' + cleanChannel;
        controls.classList.add('connected');
        connectBtn.textContent = 'Disconnect';
        connected = true;
        channelInput.style.display = 'none';
      });

      client.on('disconnected', function () {
        connectBtn.disabled = false;
        loadingSpinner.style.display = 'none';
        statusText.textContent = 'Disconnected';
        controls.classList.remove('connected');
        connectBtn.textContent = 'Connect';
        connected = false;
        channelInput.style.display = '';
        channelInput.value = '';
      });

      client.connect().catch(function (err) {
        connectBtn.disabled = false;
        loadingSpinner.style.display = 'none';
        statusText.textContent = 'Gagal connect: ' + (err.message || err);
        console.error('Connection error:', err);
      });
    } catch (e) {
      connectBtn.disabled = false;
      loadingSpinner.style.display = 'none';
      statusText.textContent = 'Error: ' + e.message;
    }
  }

  function disconnect() {
    if (client) {
      client.disconnect().catch(function () {});
      client = null;
    }
    chatContainer.innerHTML = '';
    connectBtn.disabled = false;
    loadingSpinner.style.display = 'none';
    controls.classList.remove('connected');
    connectBtn.textContent = 'Connect';
    connected = false;
    channelInput.style.display = '';
    channelInput.value = '';
    channelInput.focus();
    statusText.textContent = '';
    statusText.style.display = 'none';
  }

  connectBtn.addEventListener('click', function () {
    if (connectBtn.disabled) return;
    if (connected) {
      disconnect();
      return;
    }
    var channel = channelInput.value.trim();
    if (!channel) {
      statusText.style.display = 'inline';
      statusText.textContent = 'Masukkan nama channel';
      return;
    }
    connect(channel);
  });

  channelInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      connectBtn.click();
    }
  });
})();
</script>
</body>
</html>
